name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'content/**'
      - '.github/workflows/build-windows.yml'

jobs:
  windows-installer:
    runs-on: windows-latest
    env:
      JAVAFX_VERSION: '21.0.5'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ── Download JavaFX SDK (for compiling) and jmods (for jpackage) ──────────
      - name: Download JavaFX
        shell: pwsh
        run: |
          $ver = $env:JAVAFX_VERSION
          $sdkUrl  = "https://download2.gluonhq.com/openjfx/$ver/openjfx-${ver}_windows-x64_bin-sdk.zip"
          $modsUrl = "https://download2.gluonhq.com/openjfx/$ver/openjfx-${ver}_windows-x64_bin-jmods.zip"
          Invoke-WebRequest -Uri $sdkUrl  -OutFile javafx-sdk.zip
          Invoke-WebRequest -Uri $modsUrl -OutFile javafx-jmods.zip
          Expand-Archive -Path javafx-sdk.zip  -DestinationPath javafx-sdk-extract
          Expand-Archive -Path javafx-jmods.zip -DestinationPath javafx-jmods-extract
          # Normalise folder names (the zips contain a versioned subfolder)
          $sdkDir  = (Get-ChildItem javafx-sdk-extract  -Directory | Select-Object -First 1).FullName
          $modsDir = (Get-ChildItem javafx-jmods-extract -Directory | Select-Object -First 1).FullName
          "JAVAFX_SDK_LIB=$sdkDir\lib"   | Out-File -FilePath $env:GITHUB_ENV -Append
          "JAVAFX_JMODS=$modsDir"        | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Compile
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          javac `
            --module-path "$env:JAVAFX_SDK_LIB" `
            --add-modules javafx.controls,javafx.web `
            -d build src/MoafCampaignApp.java
          jar cf MOAF-Campaign-App.jar -C build .

      - name: Prepare installer files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force package-input | Out-Null
          Copy-Item MOAF-Campaign-App.jar package-input/
          Copy-Item content package-input/content -Recurse

      - name: Build EXE
        shell: pwsh
        run: |
          jpackage `
            --type exe `
            --name "MOAF Campaign Index" `
            --app-version "1.0.0" `
            --vendor "Memories of a Few" `
            --input package-input `
            --main-jar MOAF-Campaign-App.jar `
            --main-class 'MoafCampaignApp$Launcher' `
            --module-path "$env:JAVAFX_JMODS" `
            --add-modules javafx.controls,javafx.web,jdk.httpserver,java.desktop `
            --win-menu `
            --win-shortcut `
            --win-dir-chooser `
            --dest installer

      - uses: actions/upload-artifact@v4
        with:
          name: MOAF-Campaign-Index-Windows
          path: installer/*.exe

